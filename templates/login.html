<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Hangarin</title>
    {% include 'includes/pwa_head.html' %}
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #410000, #120000);
        color: #fdfdfd;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .page-wrap {
        width: 100%;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px 0;
      }
      .card {
        background: rgba(33, 0, 0, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 22px;
        padding: 28px 30px 34px;
        box-shadow: 0 20px 42px rgba(0, 0, 0, 0.42);
        width: min(520px, 92vw);
        animation: cardReveal 520ms ease-out both;
      }
      .logo-wrap {
        text-align: center;
        margin-bottom: 12px;
      }
      h2 {
        margin-bottom: 14px;
        font-size: clamp(1.4rem, 2vw, 2.2rem);
        color: #ffffff;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.25);
        text-align: center;
        animation: fadeLift 600ms ease-out both;
        animation-delay: 140ms;
      }
      form p {
        margin: 0 0 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        color: #f7f7f7;
        text-align: left;
      }
      input {
        display: block;
        width: 100%;
        margin: 0 0 14px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 10px;
        background: #fff;
        color: #1a1a1a;
        padding: 10px 12px;
      }
      button {
        width: 100%;
        margin: 0;
        display: block;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(90deg, #b91c1c, #f87171);
        box-shadow: 0 6px 18px rgba(185, 28, 28, 0.35);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          filter 0.2s ease,
          box-shadow 0.2s ease;
      }
      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.1);
        box-shadow: 0 8px 22px rgba(185, 28, 28, 0.55);
      }
      .error {
        color: #fecaca;
        background: rgba(254, 202, 202, 0.2);
        border: 1px solid #fca5a5;
        border-radius: 8px;
        padding: 8px;
        margin-top: 10px;
        text-align: center;
      }
      .info {
        text-align: center;
        color: #cbd5e1;
        font-size: 0.94rem;
      }
      .info a {
        color: #60a5fa;
      }
      .logo-wrap {
        text-align: center;
        margin-bottom: 8px;
        padding-top: 16px;
        animation: fadeLift 560ms ease-out both;
        animation-delay: 80ms;
      }
      .card {
        margin-top: 6px;
      }
      .app-logo {
        width: 108px;
        height: auto;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.46);
        background: rgba(255, 255, 255, 0.04);
      }
      form {
        animation: fadeLift 620ms ease-out both;
        animation-delay: 200ms;
      }
      .info {
        animation: fadeLift 660ms ease-out both;
        animation-delay: 280ms;
      }
      @keyframes cardReveal {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes fadeLift {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .card,
        .logo-wrap,
        h2,
        form,
        .info {
          animation: none;
        }
      }
      @media (max-width: 520px) {
        .card {
          padding: 20px 16px 24px;
          border-radius: 14px;
          width: min(520px, 95vw);
        }
        h2 {
          margin-bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <div class="card">
        <div class="logo-wrap">
          <img
            class="app-logo"
            src="{% static 'Logo.jpg' %}"
            alt="Hangarin app logo"
          />
        </div>
        <h2>Hangarin App</h2>
        <form method="post">
          {% csrf_token %} {{ form.as_p }}
          <button type="submit">Log In</button>
        </form>
        {% if form.errors %}
        <p class="error">Invalid username or password.</p>
        {% endif %}
        <p class="info">
          Not registered yet? Contact the admin to set up an account.
        </p>
      </div>
    </div>
  </body>
</html>
